# Fork-only workflow (EPIC-17/UP-09): build the patched COSI central controller
# from antonioacg/container-object-storage-interface and push it to the
# ghcr.io/antonioacg/objectstorage-controller package. This package is LINKED
# to this repo (created by mirror-cosi.yml, INFRA-56), so only workflows here
# can write it — the COSI fork's own workflow token gets write_package denied.
# Dispatch manually with the branch/tag to build. Not for upstream.
name: Build patched COSI controller

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "antonioacg/container-object-storage-interface ref to build"
        required: true
        default: "fix/waiting-requeue-not-backoff"
      tag:
        description: "Image tag to push"
        required: true
        default: "v0.2.0-rc1-46fde39-fix.1"

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout COSI fork
        uses: actions/checkout@v4
        with:
          repository: antonioacg/container-object-storage-interface
          ref: ${{ inputs.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push controller image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: controller/Dockerfile
          platforms: linux/arm64,linux/amd64
          push: true
          tags: ghcr.io/antonioacg/objectstorage-controller:${{ inputs.tag }}
