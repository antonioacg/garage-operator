{{- if .Values.crds.install }}
{{- range $path, $_ := .Files.Glob "crd-bases/**.yaml" }}
{{- $crd := $.Files.Get $path | fromYaml }}
{{- /* Handle CRDs that declare a conversion webhook.

       When .Values.webhooks.enabled is true: rewire the conversion webhook clientConfig
       at the release-scoped service so cert-manager can inject the CA.

       When .Values.webhooks.enabled is false: drop the conversion stanza (no service to
       point at) and mark every non-storage version as served=false. We deliberately keep
       these version entries in spec.versions — removing them would violate Kubernetes'
       invariant "every entry in status.storedVersions must still appear in spec.versions",
       which breaks upgrades for any cluster that previously stored objects in a legacy
       version. Marking them unserved means clients cannot request them at runtime, so the
       API server never needs the conversion webhook to translate them. Existing stored
       objects remain decodable via the version entry's schema. */}}
{{- if hasKey $crd.spec "conversion" }}
{{- if $.Values.webhooks.enabled }}
{{- $_ := set $crd.spec.conversion.webhook.clientConfig.service "name" (include "garage-operator.webhookServiceName" $) }}
{{- $_ := set $crd.spec.conversion.webhook.clientConfig.service "namespace" $.Release.Namespace }}
{{- else }}
{{- $_ := unset $crd.spec "conversion" }}
{{- $patched := list }}
{{- range $v := $crd.spec.versions }}
{{- if not $v.storage }}
{{- $_ := set $v "served" false }}
{{- end }}
{{- $patched = append $patched $v }}
{{- end }}
{{- $_ := set $crd.spec "versions" $patched }}
{{- end }}
{{- end }}
---
apiVersion: {{ $crd.apiVersion }}
kind: {{ $crd.kind }}
metadata:
  annotations:
    {{- with $crd.metadata.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if $.Values.crds.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
    {{- if and (hasKey $crd.spec "conversion") $.Values.webhooks.certManager.enabled }}
    cert-manager.io/inject-ca-from: {{ $.Release.Namespace }}/{{ include "garage-operator.webhookCertName" $ }}
    {{- end }}
    {{- with $.Values.crds.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    {{- include "garage-operator.labels" $ | nindent 4 }}
  name: {{ $crd.metadata.name }}
spec:
  {{- toYaml $crd.spec | nindent 2 }}
{{- end }}
{{- end }}
